<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/webp" href="/icon.webp" />
    <link rel="apple-touch-icon" href="/icon.webp" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- SEO par défaut — remplacé dynamiquement page par page via useSEO.js -->
    <title>BrandPack — Emballages personnalisés Algérie</title>
    <meta name="description" content="Emballages personnalisés pour votre business en Algérie — boites, sacs, cartes, papier d'emballage. Livraison dans les 58 wilayas." />
    <meta name="robots" content="index, follow" />

    <!-- Open Graph -->
    <meta property="og:type"        content="website" />
    <meta property="og:site_name"   content="BrandPack" />
    <meta property="og:title"       content="BrandPack — Emballages personnalisés Algérie" />
    <meta property="og:description" content="Emballages personnalisés pour votre business en Algérie — boites, sacs, cartes, papier." />
    <meta property="og:image"       content="/main.webp" />

    <!-- Preload hero image → améliore le LCP (Largest Contentful Paint) -->
    <link rel="preload" as="image" href="/mainPC.webp" fetchpriority="high" />

    <!-- Fonts — display=swap évite le FOIT (flash invisible text) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&family=Tajawal:wght@400;500;700;800;900&display=swap"
      rel="stylesheet"
      media="print" onload="this.media='all'"
    />
    <noscript>
      <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet" />
    </noscript>

    <!-- Meta Pixel — init uniquement, PAS de PageView ici
         Le PageView est déclenché par App.jsx (PageViewTracker) à chaque
         changement de route, avec event_id pour la déduplication CAPI.
         L'ID est injecté par Vite au build via %VITE_META_PIXEL_ID%.        -->
    <script>
      !function(f,b,e,v,n,t,s)
      {if(f.fbq)return;n=f.fbq=function(){n.callMethod?
      n.callMethod.apply(n,arguments):n.queue.push(arguments)};
      if(!f._fbq)f._fbq=n;n.push=n;n.loaded=!0;n.version='2.0';
      n.queue=[];t=b.createElement(e);t.async=!0;
      t.src=v;s=b.getElementsByTagName(e)[0];
      s.parentNode.insertBefore(t,s)}(window, document,'script',
      'https://connect.facebook.net/en_US/fbevents.js');
      fbq('init', '%VITE_META_PIXEL_ID%');
    </script>
  </head>
  <body>
    <noscript>
      <img height="1" width="1" style="display:none"
        src="https://www.facebook.com/tr?id=%VITE_META_PIXEL_ID%&ev=PageView&noscript=1"/>
    </noscript>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
